<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectorHUB - 连接器行业知识库</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#"><span class="logo-icon">⬡</span><span class="logo-text">Connector<strong>HUB</strong></span></a>
    <nav class="nav" id="mainNav">
      <button class="nav-link active" data-cat="all">全部</button>
      <button class="nav-link" data-cat="行业新闻">行业新闻</button>
      <button class="nav-link" data-cat="技术文章">技术文章</button>
      <button class="nav-link" data-cat="厂家档案">厂家档案</button>
    </nav>
  </div>
</header>

<div class="container">
  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar">
    <span class="stat-item" id="statCount">加载中...</span>
    <span class="stat-sep">|</span>
    <span class="stat-item" id="statRange"></span>
  </div>

  <!-- Search & Filter -->
  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索关键词..." autocomplete="off">
      <button id="searchClear" class="search-clear" style="display:none">✕</button>
    </div>
    <div class="date-filters">
      <input type="date" id="dateFrom" title="开始日期">
      <span class="date-sep">至</span>
      <input type="date" id="dateTo" title="结束日期">
    </div>
    <div class="quick-filters">
      <button class="qfilter active" data-range="all">全部时间</button>
      <button class="qfilter" data-range="week">本周</button>
      <button class="qfilter" data-range="month">本月</button>
      <button class="qfilter" data-range="3month">近3月</button>
    </div>
  </div>

  <!-- Article Grid -->
  <div class="article-grid" id="articleGrid">
    <div class="loading">加载中…</div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <!-- No results -->
  <div class="no-results" id="noResults" style="display:none">
    <div class="no-results-icon">🔍</div>
    <p>没有找到匹配的文章</p>
    <p class="hint">试试调整筛选条件或搜索关键词</p>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div>
        <span class="article-badge" id="detailBadge"></span>
        <span class="article-date" id="detailDate"></span>
      </div>
      <button class="modal-close" id="detailClose">×</button>
    </div>
    <div class="modal-body">
      <h2 class="article-title" id="detailTitle"></h2>
      <div class="article-meta" id="detailMeta"></div>
      <div class="article-summary" id="detailSummary"></div>
      <div class="article-content" id="detailContent"></div>
      <div class="article-link" id="detailLink"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand"><span class="logo-icon">⬡</span> ConnectorHUB</div>
    <p class="footer-desc">连接器行业知识库 · 208篇专业文章</p>
  </div>
  <div class="footer-bottom">© 2026 ConnectorHUB. Powered by GitHub Pages.</div>
</footer>

<script src="data_行业新闻.js"></script>
<script src="data_技术文章.js"></script>
<script src="data_厂家档案.js"></script>
<script src="app.js"></script>
</body>
</html>
