<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConnectorHUB - 连接器行业知识库</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="#"><span class="logo-icon">⬡</span><span class="logo-text">Connector<strong>HUB</strong></span></a>
    <nav class="nav" id="mainNav">
      <button class="nav-link active" data-cat="all">全部</button>
      <button class="nav-link" data-cat="行业新闻">行业新闻</button>
      <button class="nav-link" data-cat="技术文章">技术文章</button>
      <button class="nav-link" data-cat="厂家档案">厂家档案</button>
    </nav>
  </div>
</header>

<!-- Hero Section -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">BETA</div>
    <h1 class="hero-title">全球连接器行业知识库</h1>
    <p class="hero-subtitle">实时追踪连接器行业动态，聚合全球一手资讯、技术解析与厂家档案</p>
    <div class="hero-stats">
      <div class="hero-stat">
        <span class="hero-stat-num" id="heroTotal">208</span>
        <span class="hero-stat-label">篇专业文章</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-num" id="heroNews">--</span>
        <span class="hero-stat-label">行业新闻</span>
      </div>
      <div class="hero-stat">
        <span class="hero-stat-num" id="heroMfr">--</span>
        <span class="hero-stat-label">厂家档案</span>
      </div>
    </div>
    <div class="hero-search">
      <span class="hero-search-icon">🔍</span>
      <input type="text" id="heroSearchInput" placeholder="搜索连接器资讯、技术文档、厂家信息..." autocomplete="off">
    </div>
  </div>
  <div class="hero-particles"></div>
</div>

<div class="container">
  <!-- Main Content -->
  <main class="main-content">
    <!-- Breadcrumb -->
    <nav class="breadcrumb" id="breadcrumb">
      <a href="#" class="breadcrumb-link" data-cat="all">首页</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current" id="breadcrumbCurrent">全部文章</span>
    </nav>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <span class="stat-item" id="statCount">加载中...</span>
      <span class="stat-sep">|</span>
      <span class="stat-item" id="statRange"></span>
      <span class="stat-sep">|</span>
      <span class="stat-item stat-dots" id="statDots"></span>
    </div>

    <!-- Search & Filter -->
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索关键词..." autocomplete="off">
        <button id="searchClear" class="search-clear" style="display:none">✕</button>
      </div>
      <div class="week-selector">
        <select id="weekSelect">
          <option value="all">全部时间</option>
        </select>
      </div>
      <div class="quick-filters">
        <button class="qfilter" data-range="week">本周</button>
        <button class="qfilter" data-range="month">本月</button>
        <button class="qfilter" data-range="3month">近3月</button>
      </div>
    </div>

    <!-- Content Type Sub-filters -->
    <div class="subfilter-bar" id="subfilterBar">
      <span class="subfilter-label">内容类型：</span>
      <button class="subfilter active" data-subfilter="all">全部</button>
      <button class="subfilter" data-subfilter="行业新闻"><span class="sf-dot dot-news"></span>行业新闻</button>
      <button class="subfilter" data-subfilter="技术文章"><span class="sf-dot dot-tech"></span>技术文章</button>
      <button class="subfilter" data-subfilter="厂家档案"><span class="sf-dot dot-mfr"></span>厂家档案</button>
    </div>

    <!-- Article Grid -->
    <div class="article-grid" id="articleGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- No results -->
    <div class="no-results" id="noResults" style="display:none">
      <div class="no-results-icon">🔍</div>
      <p>没有找到匹配的文章</p>
      <p class="hint">试试调整筛选条件或搜索关键词</p>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-panel" id="sidebarHot">
      <h3 class="sidebar-title">🔥 本周热门</h3>
      <div class="sidebar-loading">加载中...</div>
    </div>
    <div class="sidebar-panel" id="sidebarCats">
      <h3 class="sidebar-title">📊 分类统计</h3>
      <div class="sidebar-loading">加载中...</div>
    </div>
    <div class="sidebar-panel" id="sidebarRecent">
      <h3 class="sidebar-title">🕐 最近更新</h3>
      <div class="sidebar-loading">加载中...</div>
    </div>
  </aside>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div>
        <span class="article-badge" id="detailBadge"></span>
        <span class="article-date" id="detailDate"></span>
      </div>
      <button class="modal-close" id="detailClose">×</button>
    </div>
    <div class="modal-body">
      <h2 class="article-title" id="detailTitle"></h2>
      <div class="article-meta" id="detailMeta"></div>
      <div class="article-summary" id="detailSummary"></div>
      <div class="article-content" id="detailContent"></div>
      <div class="article-link" id="detailLink"></div>
      <!-- Related Articles -->
      <div class="related-section" id="detailRelated">
        <h4 class="related-title">📎 相关推荐</h4>
        <div class="related-list" id="relatedList"></div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <div class="footer-brand"><span class="logo-icon">⬡</span> ConnectorHUB</div>
    <p class="footer-desc">连接器行业知识库 · 208篇专业文章</p>
  </div>
  <div class="footer-bottom">© 2026 ConnectorHUB. Powered by GitHub Pages.</div>
</footer>

<script src="data_行业新闻.js"></script>
<script src="data_技术文章.js"></script>
<script src="data_厂家档案.js"></script>
<script src="app.js"></script>
<button class="back-to-top" id="backToTop" title="返回顶部">↑</button>
</body>
</html>
