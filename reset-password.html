<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - ConnectorHUB</title>
  <style>
    :root {
      --bg: #0f1117; --bg-card: #181b24; --border: #2a2e3a;
      --text: #e1e4ed; --text-muted: #7e8494; --primary: #4f8cff;
      --accent: #00d4aa; --danger: #ff5c5c; --radius: 12px;
      --radius-sm: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .reset-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px; width: 100%;
      max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .reset-card h1 {
      font-size: 24px; font-weight: 700; margin-bottom: 8px;
      text-align: center;
    }
    .reset-card .subtitle {
      font-size: 14px; color: var(--text-muted);
      text-align: center; margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; color: var(--text-muted);
      margin-bottom: 6px; font-weight: 500;
    }
    .form-group input {
      width: 100%; padding: 12px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-size: 15px; font-family: var(--font);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .error-msg {
      background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3);
      color: var(--danger); font-size: 13px; padding: 10px 14px;
      border-radius: var(--radius-sm); margin-bottom: 16px; display: none;
    }
    .success-msg {
      background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3);
      color: var(--accent); font-size: 13px; padding: 10px 14px;
      border-radius: var(--radius-sm); margin-bottom: 16px; display: none;
    }
    .info-msg {
      background: rgba(79,140,255,0.1); border: 1px solid rgba(79,140,255,0.3);
      color: var(--primary); font-size: 13px; padding: 10px 14px;
      border-radius: var(--radius-sm); margin-bottom: 16px;
    }
    .btn-submit {
      width: 100%; padding: 12px; background: var(--primary);
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: var(--font); transition: opacity 0.2s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--accent); text-decoration: none;
      cursor: pointer;
    }
    .back-link:hover { text-decoration: underline; }
    /* Loading state */
    .loading-spinner {
      display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="reset-card">
  <h1>🔑 重置密码</h1>
  <p class="subtitle">ConnectorHUB</p>

  <!-- 状态1：无效链接 -->
  <div id="stateInvalid" style="display:none;">
    <div class="error-msg" style="display:block;" id="invalidMsg">密码重置链接无效或已过期。</div>
    <button class="btn-submit" onclick="goHome()">返回首页</button>
  </div>

  <!-- 状态2：加载中 -->
  <div id="stateLoading">
    <p style="text-align:center;color:var(--text-muted);padding:20px 0;">
      <span class="loading-spinner"></span> 验证链接中...
    </p>
  </div>

  <!-- 状态3：输入新密码 -->
  <div id="stateForm" style="display:none;">
    <div class="info-msg">请设置你的新密码（至少6位）。</div>
    <div class="error-msg" id="formErr"></div>
    <div class="form-group">
      <label for="newPassword">新密码</label>
      <input type="password" id="newPassword" placeholder="至少6位" minlength="6" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirmPassword">确认密码</label>
      <input type="password" id="confirmPassword" placeholder="再次输入新密码" minlength="6" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="submitBtn" onclick="doResetPassword()">重置密码</button>
    <a class="back-link" href="index.html">← 返回首页</a>

    <!-- 键盘提交 -->
    <script>
      document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doResetPassword();
      });
    </script>
  </div>

  <!-- 状态4：成功 -->
  <div id="stateSuccess" style="display:none;">
    <div class="success-msg" style="display:block;">密码重置成功！即将跳转到首页...</div>
  </div>
</div>

<script>
// ============================================================
// Supabase 配置（与 auth.js 保持一致）
var SUPABASE_URL = 'https://clwqwidwjgharpefrufv.supabase.co';
var SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_wZDOWH6TwiEyPUNzgcWLhQ_HAZiPYZw';

var accessToken = null;
var refreshToken = null;

// ============================================================
// 从 URL hash 中提取 token
function parseHash() {
  var hash = window.location.hash.substring(1); // 去掉开头的 #
  if (!hash) return null;

  var params = {};
  hash.split('&').forEach(function(pair) {
    var parts = pair.split('=');
    params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
  });
  return params;
}

function showState(stateId) {
  ['stateInvalid', 'stateLoading', 'stateForm', 'stateSuccess'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  var target = document.getElementById(stateId);
  if (target) target.style.display = 'block';
}

function goHome() {
  window.location.href = 'index.html';
}

// ============================================================
// 验证 token 有效性
function verifyToken() {
  var params = parseHash();

  if (!params || !params.access_token || params.type !== 'recovery') {
    showState('stateInvalid');
    return;
  }

  accessToken = params.access_token;
  refreshToken = params.refresh_token || '';

  // 验证 token 是否有效
  fetch(SUPABASE_URL + '/auth/v1/user', {
    method: 'GET',
    headers: {
      'apikey': SUPABASE_PUBLISHABLE_KEY,
      'Authorization': 'Bearer ' + accessToken
    }
  }).then(function(res) {
    return res.json().then(function(data) {
      if (res.ok && data.id) {
        // Token 有效，显示密码重置表单
        showState('stateForm');
        document.getElementById('newPassword').focus();
      } else {
        document.getElementById('invalidMsg').textContent = '密码重置链接无效或已过期。';
        showState('stateInvalid');
      }
    });
  }).catch(function() {
    document.getElementById('invalidMsg').textContent = '验证失败，请重新申请密码重置。';
    showState('stateInvalid');
  });
}

// ============================================================
// 执行密码重置
function doResetPassword() {
  var newPwd = document.getElementById('newPassword').value;
  var confirmPwd = document.getElementById('confirmPassword').value;
  var errEl = document.getElementById('formErr');
  var btn = document.getElementById('submitBtn');

  errEl.style.display = 'none';
  errEl.textContent = '';

  if (!newPwd || newPwd.length < 6) {
    errEl.textContent = '密码至少需要6位';
    errEl.style.display = 'block';
    return;
  }
  if (newPwd !== confirmPwd) {
    errEl.textContent = '两次输入的密码不一致';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 重置中...';

  fetch(SUPABASE_URL + '/auth/v1/user', {
    method: 'PUT',
    headers: {
      'apikey': SUPABASE_PUBLISHABLE_KEY,
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ password: newPwd })
  }).then(function(res) {
    if (res.ok) {
      showState('stateSuccess');
      // 3秒后跳转到首页
      setTimeout(function() {
        window.location.href = 'index.html';
      }, 2000);
    } else {
      return res.json().then(function(data) {
        throw new Error(data.message || data.msg || '重置失败');
      });
    }
  }).catch(function(e) {
    errEl.textContent = '重置失败：' + (e.message || '请稍后重试');
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '重置密码';
  });
}

// ============================================================
// 页面加载
verifyToken();
</script>
</body>
</html>
